<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workflow Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background:#f6f7fb; }
    .card { border:0; box-shadow:0 2px 10px rgba(0,0,0,.06); }
    .status-dot { width:10px; height:10px; display:inline-block; border-radius:50%; margin-right:6px; }
    .timeline-row { display:grid; grid-template-columns: 220px 1fr 140px; gap:12px; align-items:center; }
    .bar-wrap { background:#e9ecef; height:18px; border-radius:12px; position:relative; overflow:hidden; }
    .bar { height:18px; border-radius:12px; background:#6c757d; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-semibold" href="{% url 'dashboard' %}">Workflow</a>
    <div class="navbar-nav">
      <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
      <a class="nav-link" href="{% url 'workflow_list' %}">Flujos</a>
      <a class="nav-link" href="/admin/">Admin</a>
    </div>
    <div class="ms-auto">
      {% if user.is_authenticated %}
        <span class="me-3">{{ user.username }}</span>
        <a class="btn btn-outline-secondary btn-sm" href="{% url 'logout' %}">Salir</a>
      {% endif %}
    </div>
  </div>
</nav>
<main class="container-fluid px-4">
  {% for message in messages %}<div class="alert alert-info">{{ message }}</div>{% endfor %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
